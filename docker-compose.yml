# ── ZAV Interior & Clean — Docker Swarm + Traefik (RenaceNet) ──
#  Stack name: zav  ·  Domain: zavinteriorclean.com
#  Network:    RenaceNet (external overlay)
#  Entrypoints: web (:80), websecure (:443)
#  Cert resolver: letsencryptresolver

services:
  web:
    image: zav-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      ZAV_DATA_DIR: /app/data
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-04J27}
    volumes:
      - zav_data:/app/data
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 64M
      labels:
        # Traefik base
        - traefik.enable=true
        - traefik.docker.network=RenaceNet
        - traefik.constraint-label=traefik-public

        # ── HTTP → HTTPS redirect ───────────────────────────────
        - traefik.http.routers.zav-http.rule=Host(`zavinteriorclean.com`) || Host(`www.zavinteriorclean.com`)
        - traefik.http.routers.zav-http.entrypoints=web
        - traefik.http.routers.zav-http.middlewares=zav-redirect-https

        # ── HTTPS canonical (apex) ──────────────────────────────
        - traefik.http.routers.zav.rule=Host(`zavinteriorclean.com`)
        - traefik.http.routers.zav.entrypoints=websecure
        - traefik.http.routers.zav.tls=true
        - traefik.http.routers.zav.tls.certresolver=letsencryptresolver
        - traefik.http.routers.zav.service=zav-svc
        - traefik.http.routers.zav.middlewares=zav-security

        # ── HTTPS www → apex redirect ───────────────────────────
        - traefik.http.routers.zav-www.rule=Host(`www.zavinteriorclean.com`)
        - traefik.http.routers.zav-www.entrypoints=websecure
        - traefik.http.routers.zav-www.tls=true
        - traefik.http.routers.zav-www.tls.certresolver=letsencryptresolver
        - traefik.http.routers.zav-www.middlewares=zav-www-redirect
        - traefik.http.routers.zav-www.service=zav-svc

        # ── Service ─────────────────────────────────────────────
        - traefik.http.services.zav-svc.loadbalancer.server.port=4321
        - traefik.http.services.zav-svc.loadbalancer.healthcheck.path=/healthz
        - traefik.http.services.zav-svc.loadbalancer.healthcheck.interval=30s

        # ── Middlewares ─────────────────────────────────────────
        - traefik.http.middlewares.zav-redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.zav-redirect-https.redirectscheme.permanent=true

        - traefik.http.middlewares.zav-www-redirect.redirectregex.regex=^https?://www\.(.+)$$
        - traefik.http.middlewares.zav-www-redirect.redirectregex.replacement=https://$$1
        - traefik.http.middlewares.zav-www-redirect.redirectregex.permanent=true

        - traefik.http.middlewares.zav-security.headers.stsSeconds=31536000
        - traefik.http.middlewares.zav-security.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.zav-security.headers.stsPreload=true
        - traefik.http.middlewares.zav-security.headers.contentTypeNosniff=true
        - traefik.http.middlewares.zav-security.headers.browserXssFilter=true
        - traefik.http.middlewares.zav-security.headers.referrerPolicy=strict-origin-when-cross-origin

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  zav_data:

networks:
  RenaceNet:
    external: true
