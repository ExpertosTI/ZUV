# ── ZAV Interior & Clean — Docker Swarm + Traefik (RenaceNet) ──
#  Stack name: zuv
#  Domains:    zavinteriorclean.com · www · zav.renace.tech
#  Repo:       https://github.com/ExpertosTI/ZUV
#  Network:    RenaceNet (external overlay)
#  Entrypoints: web (:80), websecure (:443)
#  Cert resolver: letsencryptresolver

services:
  web:
    image: zuv-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    # Host .env is read at deploy time (run ./deploy.sh from /opt/zuv)
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      ZAV_DATA_DIR: /app/data
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-04J27}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-info@renace.tech}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_PROFILE: ${SMTP_PROFILE:-hostinger}
      SMTP_FROM: ${SMTP_FROM:-hello@zavinteriorclean.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ZAV Interior & Clean}
      SMTP_REPLY_TO: ${SMTP_REPLY_TO:-hello@zavinteriorclean.com}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://zavinteriorclean.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-azhaliaestepan@gmail.com}
      INSFORGE_URL: ${INSFORGE_URL:-https://insforge.renace.tech}
      INSFORGE_ANON_KEY: ${INSFORGE_ANON_KEY:-eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJyb2xlIjogImFub24ifQ.YTrshWNWGSWsmc6DUhitFQSXDICh9BTIiz4CK0GX0Cw}
      INSFORGE_SERVICE_KEY: ${INSFORGE_SERVICE_KEY:-}
    volumes:
      - zav_data:/app/data
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 64M
      labels:
        # Traefik base
        - traefik.enable=true
        - traefik.docker.network=RenaceNet
        - traefik.constraint-label=traefik-public

        # ── HTTP → HTTPS redirect ───────────────────────────────
        - traefik.http.routers.zuv-http.rule=Host(`zavinteriorclean.com`) || Host(`www.zavinteriorclean.com`) || Host(`zav.renace.tech`)
        - traefik.http.routers.zuv-http.entrypoints=web
        - traefik.http.routers.zuv-http.middlewares=zuv-redirect-https

        # ── HTTPS (apex + renace) ───────────────────────────────
        - traefik.http.routers.zuv.rule=Host(`zavinteriorclean.com`) || Host(`zav.renace.tech`)
        - traefik.http.routers.zuv.entrypoints=websecure
        - traefik.http.routers.zuv.tls=true
        - traefik.http.routers.zuv.tls.certresolver=letsencryptresolver
        - traefik.http.routers.zuv.service=zuv-svc
        - traefik.http.routers.zuv.middlewares=zuv-security

        # ── HTTPS www → apex redirect ───────────────────────────
        - traefik.http.routers.zuv-www.rule=Host(`www.zavinteriorclean.com`)
        - traefik.http.routers.zuv-www.entrypoints=websecure
        - traefik.http.routers.zuv-www.tls=true
        - traefik.http.routers.zuv-www.tls.certresolver=letsencryptresolver
        - traefik.http.routers.zuv-www.middlewares=zuv-www-redirect
        - traefik.http.routers.zuv-www.service=zuv-svc

        # ── Service ─────────────────────────────────────────────
        - traefik.http.services.zuv-svc.loadbalancer.server.port=4321
        - traefik.http.services.zuv-svc.loadbalancer.healthcheck.path=/healthz
        - traefik.http.services.zuv-svc.loadbalancer.healthcheck.interval=30s

        # ── Middlewares ─────────────────────────────────────────
        - traefik.http.middlewares.zuv-redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.zuv-redirect-https.redirectscheme.permanent=true

        - traefik.http.middlewares.zuv-www-redirect.redirectregex.regex=^https?://www\.(.+)$$
        - traefik.http.middlewares.zuv-www-redirect.redirectregex.replacement=https://$$1
        - traefik.http.middlewares.zuv-www-redirect.redirectregex.permanent=true

        - traefik.http.middlewares.zuv-security.headers.stsSeconds=31536000
        - traefik.http.middlewares.zuv-security.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.zuv-security.headers.stsPreload=true
        - traefik.http.middlewares.zuv-security.headers.contentTypeNosniff=true
        - traefik.http.middlewares.zuv-security.headers.browserXssFilter=true
        - traefik.http.middlewares.zuv-security.headers.referrerPolicy=strict-origin-when-cross-origin

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  zav_data:

networks:
  RenaceNet:
    external: true
